# Production configuration
spring.profiles.active=prod

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.ssl.enabled=true

# STOMP Relay
rabbitmq.stomp.host=${RABBITMQ_HOST}
rabbitmq.stomp.port=61614
rabbitmq.stomp.login=${RABBITMQ_USER}
rabbitmq.stomp.passcode=${RABBITMQ_PASSWORD}

# Application
app.base-url=${APP_URL}
server.port=8080

# File Upload (Render uses /etc/secrets or disk, but for free tier we might use a temp dir or external storage)
file.upload-dir=/tmp/chat-uploads
