# App name
spring.application.name=chat-application

#Application specific properties
app.api-version=v1

# Hibernate specific properties
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# MySQL specific properties
spring.datasource.url=jdbc:mysql://localhost:3307/chat_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root


# Server Port number specific properties
app.base-url=http://localhost:3030

server.port=3030

# ── Redis (OTP Store) ────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# ───────────────────────────────────────────────────────────────────

# ── RabbitMQ ──────────────────────────────────────────────────────────────
# AMQP connection (spring-boot-starter-amqp)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# STOMP relay — WebSocket broker (port 61613, enable rabbitmq_stomp plugin)
rabbitmq.stomp.host=localhost
rabbitmq.stomp.port=61613
rabbitmq.stomp.login=guest
rabbitmq.stomp.passcode=guest
# ───────────────────────────────────────────────────────────────────
# File storage — persistent directory (survives reboots, unlike /tmp/)
# Options:
#   ./uploads/              → relative to working directory (CWD when running mvn spring-boot:run)
#   ${user.home}/chat-uploads/  → in user home, always absolute
#   /var/chatapp/uploads/   → system-wide, needs write permissions
file.upload-dir=${user.home}/chat-uploads
spring.devtools.restart.additional-exclude=uploads/**
app.title=api/${app.api-version}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Message encryption key (32 chars for AES-256)
app.encryption.secret-key=ChatApp2026SecretKey32BytesLong!

